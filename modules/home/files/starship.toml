format = """░▒$directory▒$git_branch$git_status▓$c$elixir$elm$golang$gradle$haskell$java$julia$nodejs$nim$rust$scala▓$docker_context▓$cmd_duration▒░"""

add_newline = false

[directory]
style = "bold bg:#302e26 fg:#c8c8c0"
format = "[$path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[c]
symbol = " "
style = "bold bg:#f0c040"
format = '[ $symbol ($version) ]($style)'

[cpp]
symbol = " "
style = "bold bg:#f0c040"
format = '[ $symbol ($version) ]($style)'

[docker_context]
symbol = " "
style = "bold bg:#302e26 fg:#c8c8c0"
format = '[ $symbol $context ]($style)'

[elixir]
symbol = " "
style = "bold bg:#f0c040"
format = '[ $symbol ($version) ]($style)'

[elm]
symbol = " "
style = "bold bg:#f0c040"
format = '[ $symbol ($version) ]($style)'

[git_branch]
symbol = ""
style = "bold bg:#f0c040 fg:#28261f"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bold bg:#f0c040 fg:#28261f"
format = '[$all_status$ahead_behind ]($style)'

[golang]
symbol = " "
style = "bold bg:#f0c040"
format = '[ $symbol ($version) ]($style)'

[gradle]
style = "bold bg:#f0c040"
format = '[ $symbol ($version) ]($style)'

[haskell]
symbol = " "
style = "bold bg:#f0c040"
format = '[ $symbol ($version) ]($style)'

[java]
symbol = " "
style = "bold bg:#f0c040"
format = '[ $symbol ($version) ]($style)'

[julia]
symbol = " "
style = "bold bg:#f0c040"
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = ""
style = "bold bg:#f0c040"
format = '[ $symbol ($version) ]($style)'

[nim]
symbol = "󰆥 "
style = "bold bg:#f0c040"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = ""
style = "bold bg:#f0c040"
format = '[ $symbol ($version) ]($style)'

[scala]
symbol = " "
style = "bold bg:#f0c040"
format = '[ $symbol ($version) ]($style)'


[cmd_duration]
min_time = 0
show_milliseconds = true
disabled = false
style = "bold bg:#302e26 fg:#c8c8c0"
format = '[ ⏱ $duration]($style)'